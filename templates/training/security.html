<!DOCTYPE html>
<html>
<head>
    <title>Security Training</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f5f7fa; }
        .course-card { background: white; border-radius: 20px; padding: 20px; margin: 20px 0; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .register-form input { margin: 6px 0; padding: 8px; width: 100%; border-radius: 8px; border: 1px solid #ccc; }
        button { background: #1f6e6c; color: white; padding: 10px 20px; border: none; border-radius: 30px; cursor: pointer; }
    </style>
</head>
<body>
    <h1><i class="fas fa-shield-alt"></i> Security Training</h1>
    <form action="/training/security/register" method="post" class="register-form" style="max-width: 400px; background: #f0f0f0; padding: 20px; border-radius: 15px;">
        <h3>Register for Security Awareness</h3>
        <input type="text" name="name" placeholder="Full name" required>
        <input type="text" name="worker_id" placeholder="Worker ID (optional)">
        <input type="text" name="phone" placeholder="Phone">
        <input type="email" name="email" placeholder="Email" required>
        <input type="text" name="department" placeholder="Department">
        <button type="submit">Submit Registration</button>
    </form>
    {% if courses %}
        <h2>Available Courses</h2>
        {% for c in courses %}
        <div class="course-card">
            <h3>{{ c.title }}</h3>
            <p>{{ c.description }}</p>
            {% if c.video_url %}
            <iframe width="100%" height="315" src="{{ c.video_url }}" frameborder="0" allowfullscreen></iframe>
            {% endif %}
        </div>
        {% endfor %}
    {% endif %}
</body>
</html>
