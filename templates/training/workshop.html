<!DOCTYPE html>
<html>
<head>
    <title>Workshop Training</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { font-family: Arial; padding: 20px; background: #eef2f5; }
        .container { max-width: 1000px; margin: auto; background: white; border-radius: 20px; padding: 20px; }
        .workshop { border: 1px solid #ddd; border-radius: 16px; padding: 15px; margin-bottom: 20px; }
        button, input, textarea { padding: 8px 16px; margin: 5px; border-radius: 8px; border: 1px solid #ccc; }
        button { background: #1f6e6c; color: white; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <h1><i class="fas fa-chalkboard-user"></i> Workshop Training</h1>
    <a href="/" style="margin-bottom: 20px; display: inline-block;">← Back to Main Site</a>
    {% for workshop in workshops %}
    <div class="workshop">
        <h3>{{ workshop.title }}</h3>
        <p><strong>Date:</strong> {{ workshop.date }} at {{ workshop.time }}</p>
        <p><strong>Location:</strong> {{ workshop.location }} {% if workshop.virtual_link %}(<a href="{{ workshop.virtual_link }}" target="_blank">Virtual Link</a>){% endif %}</p>
        <p><strong>Available seats:</strong> {{ workshop.available_seats }}</p>
        <form method="POST" action="/training/workshop/register/{{ workshop.id }}">
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="text" name="department" placeholder="Department">
            <button type="submit">Register</button>
        </form>
    </div>
    {% endfor %}
</div>
</body>
</html>
